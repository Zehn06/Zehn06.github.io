<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Başarı Planlayıcısı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a2e;
    --bg-card-hover: #1f1f35;
    --accent-blue: #4361ee;
    --accent-purple: #7209b7;
    --accent-pink: #f72585;
    --accent-green: #06d6a0;
    --accent-orange: #fb8500;
    --accent-yellow: #ffbe0b;
    --accent-red: #ef233c;
    --accent-cyan: #00b4d8;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --border: #2a2a40;
    --glass: rgba(255,255,255,0.03);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 50%, rgba(67,97,238,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(114,9,183,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(247,37,133,0.04) 0%, transparent 50%);
    z-index: -1;
    animation: bgShift 20s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(-2%,-2%) rotate(3deg); }
  }

  .app-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(67,97,238,0.15), rgba(114,9,183,0.15));
    border: 1px solid rgba(67,97,238,0.3);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-blue);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #4361ee, #7209b7, #f72585);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header p {
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 400;
  }

  .header .flag-row {
    margin-top: 12px;
    font-size: 24px;
    letter-spacing: 8px;
  }

  /* TABS */
  .tab-container {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 30px 0 24px;
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 6px;
    border: 1px solid var(--border);
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .tab-btn {
    flex: 1;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .tab-btn:hover { color: var(--text-primary); }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    color: #fff;
    box-shadow: 0 4px 15px rgba(67,97,238,0.4);
  }

  .tab-btn .tab-icon { margin-right: 6px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-blue);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
  .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-green), var(--accent-yellow)); }
  .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-orange), var(--accent-red)); }
  .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); }

  .stat-icon { font-size: 28px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 800; margin-bottom: 2px; }
  .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .progress-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
  .progress-percent { font-size: 20px; font-weight: 800; }

  .progress-bar-bg {
    width: 100%;
    height: 12px;
    background: var(--bg-primary);
    border-radius: 20px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
    transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* MOTIVATION QUOTE */
  .quote-box {
    background: linear-gradient(135deg, rgba(67,97,238,0.1), rgba(114,9,183,0.1));
    border: 1px solid rgba(67,97,238,0.2);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .quote-icon { font-size: 32px; flex-shrink: 0; }

  .quote-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.6;
    font-style: italic;
  }

  /* TASK LIST */
  .task-section {
    margin-bottom: 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-left: 4px;
  }

  .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .task-card:hover {
    background: var(--bg-card-hover);
    transform: translateX(4px);
    border-color: rgba(67,97,238,0.3);
  }

  .task-card.completed {
    opacity: 0.5;
    background: rgba(6,214,160,0.03);
    border-color: rgba(6,214,160,0.15);
  }

  .task-card.completed .task-name { text-decoration: line-through; }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }

  .task-card[data-cat="math"]::before { background: var(--accent-red); }
  .task-card[data-cat="physics"]::before { background: var(--accent-orange); }
  .task-card[data-cat="software"]::before { background: var(--accent-blue); }
  .task-card[data-cat="english"]::before { background: var(--accent-yellow); }
  .task-card[data-cat="break"]::before { background: var(--accent-green); }
  .task-card[data-cat="free"]::before { background: var(--accent-purple); }
  .task-card[data-cat="personal"]::before { background: var(--accent-cyan); }

  .task-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--text-muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    font-size: 12px;
  }

  .task-card.completed .task-checkbox {
    background: var(--accent-green);
    border-color: var(--accent-green);
  }

  .task-time {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 110px;
    font-variant-numeric: tabular-nums;
  }

  .task-emoji { font-size: 20px; flex-shrink: 0; }

  .task-info { flex: 1; }

  .task-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }

  .task-desc { font-size: 12px; color: var(--text-secondary); }

  .task-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-math { background: rgba(239,35,60,0.15); color: var(--accent-red); }
  .tag-physics { background: rgba(251,133,0,0.15); color: var(--accent-orange); }
  .tag-software { background: rgba(67,97,238,0.15); color: var(--accent-blue); }
  .tag-english { background: rgba(255,190,11,0.15); color: var(--accent-yellow); }
  .tag-break { background: rgba(6,214,160,0.15); color: var(--accent-green); }
  .tag-free { background: rgba(114,9,183,0.15); color: var(--accent-purple); }
  .tag-personal { background: rgba(0,180,216,0.15); color: var(--accent-cyan); }

  /* WEEKLY VIEW */
  .weekly-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .day-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }

  .day-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent-blue);
    box-shadow: 0 8px 24px rgba(67,97,238,0.15);
  }

  .day-card.today {
    border-color: var(--accent-blue);
    background: linear-gradient(135deg, rgba(67,97,238,0.1), rgba(114,9,183,0.05));
  }

  .day-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 4px; }
  .day-date { font-size: 24px; font-weight: 800; margin-bottom: 10px; }

  .day-progress-mini {
    width: 100%;
    height: 6px;
    background: var(--bg-primary);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .day-progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    transition: width 0.4s ease;
  }

  .day-task-count { font-size: 11px; color: var(--text-muted); font-weight: 600; }

  /* MONTHLY VIEW */
  .monthly-calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }

  .cal-header {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .cal-day {
    aspect-ratio: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .cal-day:hover { border-color: var(--accent-blue); transform: scale(1.05); }
  .cal-day.today { border-color: var(--accent-blue); background: linear-gradient(135deg, rgba(67,97,238,0.15), rgba(114,9,183,0.1)); }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.empty:hover { transform: none; }

  .cal-day .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent-green);
    margin-top: 4px;
  }

  .cal-day.has-tasks .cal-dot { background: var(--accent-blue); }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .month-nav button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }

  .month-nav button:hover { background: var(--accent-blue); border-color: var(--accent-blue); }

  .month-nav .month-label { font-size: 18px; font-weight: 700; min-width: 180px; text-align: center; }

  /* ADD TASK MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 90%;
    max-width: 480px;
    box-shadow: var(--shadow);
  }

  .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }

  .modal label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

  .modal input, .modal select, .modal textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent-blue); }

  .modal-btns { display: flex; gap: 10px; margin-top: 8px; }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    color: #fff;
    flex: 1;
  }

  .btn-primary:hover { box-shadow: 0 4px 15px rgba(67,97,238,0.4); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    flex: 1;
  }

  .btn-secondary:hover { border-color: var(--text-muted); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(67,97,238,0.4);
    transition: all 0.25s ease;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fab:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 32px rgba(67,97,238,0.5); }

  /* RESET BTN */
  .reset-row {
    text-align: center;
    margin: 20px 0 40px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 20px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.8rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .task-time { min-width: 80px; font-size: 11px; }
    .task-tag { display: none; }
    .weekly-grid { grid-template-columns: repeat(4, 1fr); }
    .monthly-calendar { gap: 3px; }
    .cal-day { border-radius: 8px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app-container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-badge">🎯 Günlük Planlayıcı</div>
    <h1>Başarı Rutini</h1>
    <p>Matematik • Fizik • Yazılım • İngilizce</p>
    <div class="flag-row">🇹🇷 → 🇮🇹</div>
  </div>

  <!-- TABS -->
  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('daily')"><span class="tab-icon">📋</span>Günlük</button>
    <button class="tab-btn" onclick="switchTab('weekly')"><span class="tab-icon">📅</span>Haftalık</button>
    <button class="tab-btn" onclick="switchTab('monthly')"><span class="tab-icon">🗓️</span>Aylık</button>
  </div>

  <!-- ==================== DAILY TAB ==================== -->
  <div id="tab-daily" class="tab-content active">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">Tamamlanan</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Toplam Görev</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏱️</div>
        <div class="stat-value" id="stat-hours">0h</div>
        <div class="stat-label">Çalışma Saati</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Gün Serisi</div>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Günlük İlerleme</span>
        <span class="progress-percent" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- QUOTE -->
    <div class="quote-box">
      <span class="quote-icon">🇮🇹</span>
      <span class="quote-text" id="daily-quote">"CEnT-S, TIL-I sınavları ve Web Geliştirme hedeflerine doğru tavizsiz bir gün daha."</span>
    </div>

    <!-- TASKS -->
    <div id="task-list"></div>

    <div class="reset-row">
      <button class="reset-btn" onclick="resetDay()">🔄 Günü Sıfırla</button>
      <button class="reset-btn" onclick="resetAll()" style="margin-left:8px;">🗑️ Tümünü Temizle</button>
    </div>
  </div>

  <!-- ==================== WEEKLY TAB ==================== -->
  <div id="tab-weekly" class="tab-content">
    <div class="weekly-grid" id="weekly-grid"></div>
    <div id="weekly-detail"></div>
  </div>

  <!-- ==================== MONTHLY TAB ==================== -->
  <div id="tab-monthly" class="tab-content">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="monthly-calendar" id="monthly-calendar"></div>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">＋</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>➕ Yeni Görev Ekle</h2>
    <label>Görev Adı</label>
    <input type="text" id="m-name" placeholder="Örn: Matematik soru çözümü">
    <label>Açıklama</label>
    <input type="text" id="m-desc" placeholder="Örn: CEnT-S integral konusu">
    <label>Saat Aralığı</label>
    <div style="display:flex;gap:8px;">
      <input type="time" id="m-start" value="08:00">
      <input type="time" id="m-end" value="09:00">
    </div>
    <label>Kategori</label>
    <select id="m-cat">
      <option value="math">📐 Matematik</option>
      <option value="physics">⚛️ Fizik</option>
      <option value="software">💻 Yazılım</option>
      <option value="english">🇬🇧 İngilizce</option>
      <option value="break">🧘 Mola / Dinlenme</option>
      <option value="free">🎮 Serbest / Eğlence</option>
      <option value="personal">📚 Kişisel Gelişim</option>
    </select>
    <label>Tarih</label>
    <input type="date" id="m-date">
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="addTask()">Ekle</button>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const DEFAULT_TASKS = [
  { id:'d1', name:'Güne Başlangıç', desc:'Kahvaltı ve kedilerin bakımı', start:'08:00', end:'08:30', cat:'break', emoji:'🌅' },
  { id:'d2', name:'Derin Çalışma: Matematik', desc:'CEnT-S / TIL-I sınav hazırlığı, mantık ve soru çözümü', start:'08:30', end:'10:30', cat:'math', emoji:'📐' },
  { id:'d3', name:'Mola & Dinlenme', desc:'Ekrandan uzaklaş, hafif esneme hareketleri', start:'10:30', end:'11:00', cat:'break', emoji:'🧘' },
  { id:'d4', name:'Temel Bilimler: Fizik', desc:'Mühendislik giriş sınavları – formül tekrarları ve pratik', start:'11:00', end:'13:00', cat:'physics', emoji:'⚛️' },
  { id:'d5', name:'Öğle Arası & Deşarj', desc:'Yemek, Segway turu veya kedilerle vakit geçirme', start:'13:00', end:'14:00', cat:'break', emoji:'☀️' },
  { id:'d6', name:'Yazılım Geliştirme', desc:'Web development kursu, JavaScript/React pratiği', start:'14:00', end:'16:30', cat:'software', emoji:'💻' },
  { id:'d7', name:'İngilizce Pratiği', desc:'B2 hedefi – gramer, kelime, okuma/dinleme', start:'16:30', end:'18:00', cat:'english', emoji:'🇬🇧' },
  { id:'d8', name:'Esnek Zaman / Eğitimler', desc:'Kurslar, ANKUZEF modülleri veya bahçe bitkileri', start:'18:00', end:'19:30', cat:'personal', emoji:'📚' },
  { id:'d9', name:'Akşam Yemeği', desc:'Aile ile vakit geçirme ve dinlenme', start:'19:30', end:'20:30', cat:'break', emoji:'🍽️' },
  { id:'d10', name:'Serbest Zaman & Eğlence', desc:'CS2, Elden Ring, Ghost of Tsushima', start:'20:30', end:'22:30', cat:'free', emoji:'🎮' },
  { id:'d11', name:'Kişisel Okuma', desc:'Davranışsal psikoloji (Atomik Alışkanlıklar vb.)', start:'22:30', end:'23:15', cat:'personal', emoji:'📖' },
  { id:'d12', name:'Kapanış & Planlama', desc:'Yarının hedeflerini not et, uyku hazırlığı', start:'23:15', end:'23:30', cat:'personal', emoji:'🌙' }
];

const CAT_LABELS = { math:'Matematik', physics:'Fizik', software:'Yazılım', english:'İngilizce', break:'Mola', free:'Serbest', personal:'Kişisel' };
const EMOJIS = { math:'📐', physics:'⚛️', software:'💻', english:'🇬🇧', break:'🧘', free:'🎮', personal:'📚' };
const QUOTES = [
  '"Disiplin, motivasyon bittiğinde devreye giren şeydir."',
  '"Her gün %1 gelişim, bir yılda 37 kat büyüme demek."',
  '"Hayal ettiğin İtalya seni bekliyor. Bugün bir adım daha at."',
  '"Kod yaz, formül çöz, kelime öğren. Tekrar et."',
  '"Başarı bir günde gelmez ama her gün gelir."',
  '"La disciplina è il ponte tra gli obiettivi e i risultati."',
  '"Bugünkü çaban, yarının özgürlüğüdür."'
];

// ===================== STATE =====================
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function todayStr() { return new Date().toISOString().split('T')[0]; }
function getKey(date) { return 'plan_' + date; }

function loadDay(date) {
  const raw = localStorage.getItem(getKey(date));
  if (raw) return JSON.parse(raw);
  // Return default tasks for the day
  return DEFAULT_TASKS.map(t => ({ ...t, id: t.id + '_' + date, completed: false, date }));
}

function saveDay(date, tasks) {
  localStorage.setItem(getKey(date), JSON.stringify(tasks));
}

function getStreak() {
  let streak = 0;
  let d = new Date();
  while(true) {
    const ds = d.toISOString().split('T')[0];
    const tasks = loadDay(ds);
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    if (total > 0 && done === total) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (ds === todayStr()) {
      d.setDate(d.getDate() - 1); // today might not be complete yet
    } else {
      break;
    }
  }
  return streak;
}

// ===================== RENDER DAILY =====================
function renderDaily() {
  const date = todayStr();
  const tasks = loadDay(date);
  const total = tasks.length;
  const done = tasks.filter(t => t.completed).length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-streak').textContent = getStreak();

  // Calculate study hours (exclude break/free)
  let mins = 0;
  tasks.forEach(t => {
    if (t.completed && t.cat !== 'break' && t.cat !== 'free') {
      const [sh,sm] = t.start.split(':').map(Number);
      const [eh,em] = t.end.split(':').map(Number);
      mins += (eh*60+em) - (sh*60+sm);
    }
  });
  document.getElementById('stat-hours').textContent = (mins/60).toFixed(1) + 'h';

  // Quote
  const qi = Math.floor(Math.random() * QUOTES.length);
  // only set once per page load
  if (!window._quoteSet) {
    document.getElementById('daily-quote').textContent = QUOTES[qi];
    window._quoteSet = true;
  }

  // Group tasks by section
  const sections = [
    { title: 'Sabah Bloğu', color: 'var(--accent-orange)', filter: t => t.start < '12:00' },
    { title: 'Öğleden Sonra', color: 'var(--accent-blue)', filter: t => t.start >= '12:00' && t.start < '18:00' },
    { title: 'Akşam', color: 'var(--accent-purple)', filter: t => t.start >= '18:00' }
  ];

  let html = '';
  sections.forEach(sec => {
    const secTasks = tasks.filter(sec.filter);
    if (secTasks.length === 0) return;
    html += `<div class="task-section">
      <div class="section-header">
        <div class="section-dot" style="background:${sec.color}"></div>
        <span class="section-title">${sec.title}</span>
        <div class="section-line"></div>
      </div>`;
    secTasks.forEach(t => {
      html += `<div class="task-card ${t.completed ? 'completed' : ''}" data-cat="${t.cat}" onclick="toggleTask('${date}','${t.id}')">
        <div class="task-checkbox">${t.completed ? '✓' : ''}</div>
        <span class="task-time">${t.start} – ${t.end}</span>
        <span class="task-emoji">${t.emoji || EMOJIS[t.cat] || '📌'}</span>
        <div class="task-info">
          <div class="task-name">${t.name}</div>
          <div class="task-desc">${t.desc}</div>
        </div>
        <span class="task-tag tag-${t.cat}">${CAT_LABELS[t.cat]}</span>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('task-list').innerHTML = html;
}

function toggleTask(date, id) {
  const tasks = loadDay(date);
  const t = tasks.find(x => x.id === id);
  if (t) t.completed = !t.completed;
  saveDay(date, tasks);
  renderDaily();
}

function resetDay() {
  if (!confirm('Bugünkü tüm tikleri sıfırlamak istediğine emin misin?')) return;
  const date = todayStr();
  const tasks = loadDay(date);
  tasks.forEach(t => t.completed = false);
  saveDay(date, tasks);
  renderDaily();
}

function resetAll() {
  if (!confirm('TÜM verileri silmek istediğine emin misin? Bu işlem geri alınamaz.')) return;
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('plan_')) keys.push(key);
  }
  keys.forEach(k => localStorage.removeItem(k));
  renderDaily();
}

// ===================== WEEKLY =====================
function renderWeekly() {
  const today = new Date();
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7));

  const days = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  let html = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const ds = d.toISOString().split('T')[0];
    const tasks = loadDay(ds);
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const pct = total ? Math.round((done/total)*100) : 0;
    const isToday = ds === todayStr();

    html += `<div class="day-card ${isToday ? 'today' : ''}">
      <div class="day-name">${days[i]}</div>
      <div class="day-date">${d.getDate()}</div>
      <div class="day-progress-mini"><div class="day-progress-fill" style="width:${pct}%"></div></div>
      <div class="day-task-count">${done}/${total} görev</div>
    </div>`;
  }

  document.getElementById('weekly-grid').innerHTML = html;

  // Weekly summary
  let totalTasks = 0, totalDone = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const ds = d.toISOString().split('T')[0];
    const tasks = loadDay(ds);
    totalTasks += tasks.length;
    totalDone += tasks.filter(t => t.completed).length;
  }

  const weekPct = totalTasks ? Math.round((totalDone/totalTasks)*100) : 0;
  document.getElementById('weekly-detail').innerHTML = `
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Haftalık İlerleme</span>
        <span class="progress-percent">${weekPct}%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${weekPct}%"></div>
      </div>
    </div>
    <div class="quote-box">
      <span class="quote-icon">📊</span>
      <span class="quote-text">Bu hafta toplam ${totalDone}/${totalTasks} görev tamamlandı. ${weekPct >= 70 ? 'Harika gidiyorsun! 🔥' : 'Hedefe devam! 💪'}</span>
    </div>`;
}

// ===================== MONTHLY =====================
function renderMonthly() {
  const monthNames = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('month-label').textContent = monthNames[currentMonth] + ' ' + currentYear;

  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth + 1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Monday = 0

  const dayHeaders = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  let html = dayHeaders.map(d => `<div class="cal-header">${d}</div>`).join('');

  for (let i = 0; i < startDow; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  const todayDate = todayStr();

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tasks = loadDay(ds);
    const done = tasks.filter(t => t.completed).length;
    const total = tasks.length;
    const isToday = ds === todayDate;
    const hasTasks = total > 0 && done > 0;

    html += `<div class="cal-day ${isToday ? 'today' : ''} ${hasTasks ? 'has-tasks' : ''}">
      ${d}
      ${hasTasks ? '<div class="cal-dot"></div>' : ''}
    </div>`;
  }

  document.getElementById('monthly-calendar').innerHTML = html;
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderMonthly();
}

// ===================== TABS =====================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.closest('.tab-btn').classList.add('active');

  if (tab === 'daily') renderDaily();
  if (tab === 'weekly') renderWeekly();
  if (tab === 'monthly') renderMonthly();
}

// ===================== MODAL =====================
function openModal() {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('m-date').value = todayStr();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function addTask() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Görev adı boş olamaz!'); return; }

  const date = document.getElementById('m-date').value;
  const task = {
    id: 'custom_' + Date.now(),
    name: name,
    desc: document.getElementById('m-desc').value.trim(),
    start: document.getElementById('m-start').value,
    end: document.getElementById('m-end').value,
    cat: document.getElementById('m-cat').value,
    emoji: EMOJIS[document.getElementById('m-cat').value],
    completed: false,
    date: date
  };

  const tasks = loadDay(date);
  tasks.push(task);
  tasks.sort((a,b) => a.start.localeCompare(b.start));
  saveDay(date, tasks);

  closeModal();
  document.getElementById('m-name').value = '';
  document.getElementById('m-desc').value = '';
  renderDaily();
}

// ===================== INIT =====================
renderDaily();
</script>

</body>
</html>
